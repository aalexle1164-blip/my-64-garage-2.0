name: Model Daily Update

on:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch: 

# 全局环境变量，解决 Node.js 版本弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 尝试升级到 v5 (通常新版会支持更新的 Node)
      - name: Checkout code
        uses: actions/checkout@v4 # 如果 v5 发布了，请改为 v5

      # 2. 升级到 v5 以支持 Node 24
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Crawler
        run: python crawler.py

      - name: Commit and Push
        run: |
          git config --global user.name "ModelBot"
          git config --global user.email "bot@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily data sync" && git push)
