<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:64 模型全球情报站</title>
    <style>
        :root { --bg: #ffffff; --card: #f9f9f9; --accent: #d32f2f; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #fff; color: #333; }
        header { padding: 20px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 1000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px 5%; max-width: 1300px; margin: 0 auto; }
        .card { border-radius: 12px; overflow: hidden; background: var(--card); border: 1px solid #eee; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--accent); }
        .img-box { width: 100%; height: 180px; background: #f0f0f0; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 15px; }
        .brand { font-size: 11px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .name { font-size: 16px; font-weight: 700; margin: 8px 0; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .price { font-size: 18px; font-weight: 800; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; width: 90%; max-width: 550px; border-radius: 15px; overflow: hidden; position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; color: #333; }
    </style>
</head>
<body>

<header>
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <h2 style="margin:0">DIECAST<span style="color:var(--accent)">64</span> HUB</h2>
        <button onclick="location.reload()" style="padding: 5px 12px; border-radius: 5px; border: 1px solid #ddd; background: #fff; cursor: pointer;">刷新数据</button>
    </div>
</header>

<div class="grid" id="grid">正在加载高清车型库...</div>

<div class="modal" id="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content">
        <span class="close" onclick="document.getElementById('modal').style.display='none'">&times;</span>
        <div id="m-content"></div>
    </div>
</div>

<script>
    // 终极保底层：如果图片全部挂掉，显示这张精美跑车图
    const fallback = "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=600";

    async function load() {
        try {
            const r = await fetch('data.json?t=' + Date.now());
            const data = await r.json();
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map((d, i) => `
                <div class="card" onclick="show(${i})">
                    <div class="img-box">
                        <img src="${d.img}" loading="lazy" onerror="this.onerror=null;this.src='${fallback}';">
                    </div>
                    <div class="card-info">
                        <div class="brand">${d.brand}</div>
                        <div class="name">${d.name}</div>
                        <div class="price">￥${d.price}</div>
                    </div>
                </div>
            `).join('');
            window.db = data;
        } catch (e) {
            document.getElementById('grid').innerHTML = "数据同步中，请稍后刷新页面...";
        }
    }

    function show(i) {
        const d = window.db[i];
        document.getElementById('m-content').innerHTML = `
            <img src="${d.img}" style="width:100%; height:300px; object-fit:cover;" onerror="this.src='${fallback}'">
            <div style="padding:25px;">
                <div class="brand">${d.brand}</div>
                <h2 style="margin:10px 0;">${d.name}</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; border-top:1px solid #eee; padding-top:20px; color:#666; font-size:14px;">
                    <div>价格: <b style="color:#333">￥${d.price}</b></div>
                    <div>材质: <b style="color:#333">${d.material}</b></div>
                    <div>预计发售: <b style="color:#333">${d.date}</b></div>
                    <div>到货状态: <b style="color:#333">${d.arrival}</b></div>
                </div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }
    load();
</script>
</body>
</html>
