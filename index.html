<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 1:64 Diecast Hub</title>
    <style>
        :root { --bg: #ffffff; --card: #f8f9fa; --text: #1a1a1a; --accent: #d32f2f; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; margin: 0; }
        header { padding: 1.5rem 5%; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 100; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 2rem 5%; max-width: 1300px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-color: var(--accent); }
        .img-container { width: 100%; height: 200px; background: #e0e0e0; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img { scale: 1.05; }
        .card-body { padding: 1.25rem; }
        .brand-tag { color: var(--accent); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .model-name { font-size: 1.1rem; font-weight: 700; margin: 0.5rem 0; height: 2.8rem; overflow: hidden; line-height: 1.4; }
        .price { font-size: 1.25rem; font-weight: 900; color: #333; }
        /* 模态框样式 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; border-radius: 16px; width: 90%; max-width: 600px; overflow: hidden; position: relative; }
        .modal-close { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #333; z-index: 10; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0">DIECAST<span style="color:var(--accent)">64</span></h2>
    <div id="status" style="font-size: 0.8rem; color: #666;">数据已通过 Wikipedia API 实时同步</div>
</header>

<main class="grid" id="grid"></main>

<div class="modal" id="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content">
        <span class="modal-close" onclick="document.getElementById('modal').style.display='none'">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    async function loadData() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            const data = await res.json();
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map((item, i) => `
                <div class="card" onclick="showModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    <div class="img-container">
                        <img src="${item.img}" class="card-img" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1542281286-9e0a16bb7366?w=400'">
                    </div>
                    <div class="card-body">
                        <div class="brand-tag">${item.brand}</div>
                        <div class="model-name">${item.name}</div>
                        <div class="price">￥${item.price}</div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('grid').innerHTML = "加载中，请稍后刷新...";
        }
    }

    function showModal(item) {
        document.getElementById('modal-body').innerHTML = `
            <img src="${item.img}" style="width:100%; max-height:350px; object-fit:cover;">
            <div style="padding: 2rem;">
                <div class="brand-tag">${item.brand}</div>
                <h2 style="margin: 0.5rem 0 1.5rem 0">${item.name}</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap: 1rem; border-top:1px solid #eee; padding-top:1.5rem">
                    <div>价格: <b>￥${item.price}</b></div>
                    <div>材质: <b>${item.material}</b></div>
                    <div>计划发售: <b>${item.date}</b></div>
                    <div>状态: <b>${item.arrival}</b></div>
                </div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    loadData();
</script>
</body>
</html>
