<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64比例全球车模情报站</title>
    <style>
        :root { --bg: #ffffff; --card: #f6f8fa; --text: #1f2328; --accent: #0969da; --border: #d0d7de; }
        [data-theme="dark"] { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --accent: #58a6ff; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; transition: 0.3s; }
        
        /* 导航栏 */
        header { padding: 20px 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .search-input { padding: 8px 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); width: 250px; }
        
        /* 品牌筛选 */
        .brand-bar { padding: 15px 5%; display: flex; gap: 10px; overflow-x: auto; max-width: 1200px; margin: 0 auto; }
        .filter-btn { padding: 5px 12px; border-radius: 15px; border: 1px solid var(--border); cursor: pointer; background: var(--card); color: var(--text); white-space: nowrap; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 网格布局 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px 5%; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
        .card-body { padding: 15px; }

        /* 模态框 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); padding: 30px; border-radius: 12px; max-width: 500px; width: 90%; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <h2 style="margin:0;">DIECAST<span style="color:var(--accent)">64</span></h2>
        <div>
            <input type="text" class="search-input" id="search" placeholder="搜索模型...">
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:20px;">🌓</button>
        </div>
    </div>
</header>

<div class="brand-bar" id="brandBar"></div>

<main class="grid" id="modelGrid"></main>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let allData = [];

    // 初始化加载
    async function init() {
        try {
            // 尝试读取本地生成的 data.json
            const res = await fetch('data.json');
            allData = await res.json();
        } catch (e) {
            console.log("未检测到 data.json，使用演示数据");
            allData = [
                { brand: 'MiniGT', name: 'Nissan Silvia S15 Top Secret', price: '99', material: '合金', date: '2024-06', arrival: '2024-08', img: 'https://via.placeholder.com/400x250?text=MiniGT+S15' },
                { brand: 'LCD', name: 'Pagani Huayra BC', price: '85', material: '合金', date: '2024-05', arrival: '现货', img: 'https://via.placeholder.com/400x250?text=LCD+Pagani' }
            ];
        }
        renderBrands();
        renderModels(allData);
    }

    function renderBrands() {
        const brands = ['全部', ...new Set(allData.map(d => d.brand))];
        document.getElementById('brandBar').innerHTML = brands.map(b => 
            `<div class="filter-btn" onclick="filterBrand('${b}')">${b}</div>`
        ).join('');
    }

    function renderModels(data) {
        document.getElementById('modelGrid').innerHTML = data.map((item, index) => `
            <div class="card" onclick="showDetail(${index})">
                <img src="${item.img}" class="card-img">
                <div class="card-body">
                    <small style="color:var(--accent)">${item.brand}</small>
                    <div style="font-weight:bold; margin:5px 0;">${item.name}</div>
                    <div style="color:var(--accent)">￥${item.price}</div>
                </div>
            </div>
        `).join('');
    }

    function filterBrand(brand) {
        const filtered = brand === '全部' ? allData : allData.filter(d => d.brand === brand);
        renderModels(filtered);
    }

    function showDetail(index) {
        const item = allData[index];
        document.getElementById('modalBody').innerHTML = `
            <img src="${item.img}" style="width:100%; border-radius:8px; margin-bottom:15px;">
            <h3>${item.name}</h3>
            <p><b>厂商：</b>${item.brand} | <b>材质：</b>${item.material}</p>
            <p><b>价格：</b>￥${item.price}</p>
            <p><b>发售时间：</b>${item.date}</p>
            <p><b>预计到货：</b>${item.arrival}</p>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'light' : 'dark');
    }

    init();
</script>
</body>
</html>
