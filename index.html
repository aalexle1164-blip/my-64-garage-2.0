<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:64 模型全球情报站</title>
    <style>
        :root { --bg: #ffffff; --card: #f9f9f9; --accent: #1a1a1a; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #fff; }
        header { padding: 25px 5%; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 30px 5%; max-width: 1400px; margin: 0 auto; }
        .card { border-radius: 15px; overflow: hidden; background: var(--card); border: 1px solid #eee; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .img-box { width: 100%; height: 200px; background: #eee; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 20px; }
        .brand { font-size: 12px; font-weight: bold; color: #d32f2f; text-transform: uppercase; }
        .name { font-size: 18px; font-weight: 700; margin: 10px 0; min-height: 50px; }
        .price { font-size: 20px; font-weight: 800; color: #1a1a1a; }
        
        /* 详情弹窗 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 600px; border-radius: 20px; overflow: hidden; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0">DIECAST<span style="color:#d32f2f">64</span> HUB</h2>
    <div style="font-size: 12px; background: #eee; padding: 5px 10px; border-radius: 5px;">2026 全球同步更新</div>
</header>

<div class="grid" id="grid"></div>

<div class="modal" id="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content">
        <span class="close" onclick="document.getElementById('modal').style.display='none'">&times;</span>
        <div id="m-content"></div>
    </div>
</div>

<script>
    // 备用图库：防止主链接失效
    const fallback = "https://images.unsplash.com/photo-1542281286-9e0a16bb7366?w=600";

    async function load() {
        try {
            const r = await fetch('data.json?v=' + Date.now());
            const data = await r.json();
            document.getElementById('grid').innerHTML = data.map((d, i) => `
                <div class="card" onclick="show(${i})">
                    <div class="img-box">
                        <img src="${d.img}" onerror="this.src='${fallback}'">
                    </div>
                    <div class="card-info">
                        <div class="brand">${d.brand}</div>
                        <div class="name">${d.name}</div>
                        <div class="price">￥${d.price}</div>
                    </div>
                </div>
            `).join('');
            window.db = data;
        } catch (e) {
            document.getElementById('grid').innerHTML = "加载中...";
        }
    }

    function show(i) {
        const d = window.db[i];
        document.getElementById('m-content').innerHTML = `
            <img src="${d.img}" style="width:100%; height:300px; object-fit:cover;" onerror="this.src='${fallback}'">
            <div style="padding:30px;">
                <div class="brand">${d.brand}</div>
                <h2 style="margin:10px 0;">${d.name}</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; border-top:1px solid #eee; padding-top:20px;">
                    <div>价格: <b>￥${d.price}</b></div>
                    <div>材质: <b>${d.material}</b></div>
                    <div>发售日期: <b>${d.date}</b></div>
                    <div>状态: <b>${d.arrival}</b></div>
                </div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }
    load();
</script>
</body>
</html>
